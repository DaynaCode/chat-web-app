openapi: 3.0.3
info:
  title: پیام‌رسان داخلی
  version: 1.0.0
  description: API سامانه پیام‌رسان
paths:
  /api/auth/login/:
    post:
      operationId: authLoginCreate
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInputRequest'
            examples:
              ورودموفق:
                value:
                  username: admin
                  password: admin123
                summary: ورود موفق
                description: نام کاربری و رمز عبور صحیح
              ورودناموفق:
                value:
                  username: admin
                  password: wrongpass
                summary: ورود ناموفق
                description: نام کاربری یا رمز عبور اشتباه
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginInputRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginInputRequest'
        required: true
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccess'
              examples:
                پاسخموفق:
                  value:
                    detail: Login successful.
                    faMessage: با موفقیت وارد شدید.
                    access: eyJhbGciOiJIUzI1NiIs...
                    refresh: eyJhbGciOiJIUzI1NiIs...
                  summary: پاسخ موفق
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginBadRequest'
              examples:
                فیلدهاینامعتبر:
                  value:
                    detail: This field is required.
                    faMessage: این فیلد الزامی است.
                  summary: فیلدهای نامعتبر
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginUnauthorized'
              examples:
                خطایاحراز:
                  value:
                    detail: Username or password is incorrect.
                    faMessage: نام کاربری یا رمز عبور نادرست است.
                  summary: خطای احراز
          description: ''
  /api/auth/logout/:
    post:
      operationId: authLogoutCreate
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequestRequest'
            examples:
              خروجکاربر:
                value:
                  refresh: eyJhbGciOiJIUzI1NiIs...
                summary: خروج کاربر
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LogoutRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LogoutRequestRequest'
      security:
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
              examples:
                خروجموفق:
                  value:
                    detail: Successfully logged out.
                  summary: خروج موفق
          description: ''
  /api/auth/me/:
    get:
      operationId: authMeRetrieve
      tags:
      - auth
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                اطلاعاتکاربر:
                  value:
                    id: 1
                    username: admin
                    isActive: true
                    isStaff: true
                    displayName: مدیر سیستم
                  summary: اطلاعات کاربر
          description: ''
  /api/auth/refresh/:
    post:
      operationId: authRefreshCreate
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequestRequest'
            examples:
              درخواسترفرش:
                value:
                  refresh: eyJhbGciOiJIUzI1NiIs...
                summary: درخواست رفرش
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefreshRequestRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefreshRequestRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshSuccess'
              examples:
                توکنجدید:
                  value:
                    access: eyJhbGciOiJIUzI1NiIs...
                  summary: توکن جدید
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshError'
              examples:
                توکننامعتبر:
                  value:
                    detail: Invalid token.
                    faMessage: توکن نامعتبر است.
                  summary: توکن نامعتبر
          description: ''
  /api/conversations/:
    get:
      operationId: conversationsList
      tags:
      - conversations
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conversation'
              examples:
                لیستمکالمات:
                  value:
                  - - id: 1
                      type: private
                      participants:
                      - id: 1
                        username: admin
                        displayName: مدیر
                      - id: 2
                        username: user1
                        displayName: کاربر عادی
                      lastMessage:
                        id: 10
                        text: سلام
                        sender:
                          id: 1
                          username: admin
                        createdAt: '2026-05-30T10:00:00Z'
                      createdAt: '2026-05-30T09:00:00Z'
                    - id: 2
                      type: group
                      group:
                        id: 1
                        name: گروه برنامه‌نویسی
                        owner: 1
                        memberCount: 15
                      lastMessage:
                        id: 25
                        text: خوش آمدید!
                        sender:
                          id: 1
                          username: admin
                        createdAt: '2026-05-30T09:30:00Z'
                      createdAt: '2026-05-29T08:00:00Z'
                  summary: لیست مکالمات
          description: ''
    post:
      operationId: conversationsCreate
      tags:
      - conversations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
            examples:
              چتخصوصی:
                value:
                  type: private
                  userId: 2
                summary: چت خصوصی
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
              examples:
                مکالمهایجادشده:
                  value:
                    id: 3
                    type: private
                    participants:
                    - id: 1
                      username: admin
                    - id: 2
                      username: user1
                    createdAt: '2026-05-30T10:05:00Z'
                  summary: مکالمه ایجادشده
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationError'
          description: ''
  /api/conversations/{conversationId}/messages/:
    get:
      operationId: conversationsMessagesList
      parameters:
      - in: path
        name: conversationId
        schema:
          type: integer
        required: true
      - in: query
        name: cursor
        schema:
          type: integer
        description: شناسه آخرین پیام
      - in: query
        name: limit
        schema:
          type: integer
        description: تعداد پیام‌ها (پیش‌فرض ۲۰)
      tags:
      - conversations
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
              examples:
                پیام‌هاییکمکالمه:
                  value:
                  - - id: 100
                      conversation: 1
                      sender:
                        id: 1
                        username: admin
                      text: سلام
                      image: null
                      createdAt: '2026-05-30T10:00:00Z'
                  summary: پیام‌های یک مکالمه
          description: ''
    post:
      operationId: conversationsMessagesCreate
      parameters:
      - in: path
        name: conversationId
        schema:
          type: integer
        required: true
      tags:
      - conversations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
            examples:
              ارسالمتنساده:
                value:
                  text: سلام!
                summary: ارسال متن ساده
              ارسالپاسخ(ریپلای):
                value:
                  text: پاسخ شما
                  repliedToId: 5
                summary: ارسال پاسخ (ریپلای)
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
              examples:
                پیامارسال‌شده:
                  value:
                    id: 101
                    conversation: 1
                    sender:
                      id: 1
                      username: admin
                    text: سلام!
                    image: null
                    createdAt: '2026-05-30T10:01:00Z'
                  summary: پیام ارسال‌شده
          description: ''
        '403':
          description: عدم عضویت
        '400':
          description: خطای اعتبارسنجی
  /api/conversations/{conversationId}/pins/:
    get:
      operationId: conversationsPinsList
      parameters:
      - in: path
        name: conversationId
        schema:
          type: integer
        required: true
      tags:
      - conversations
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
              examples:
                پین‌ها:
                  value:
                  - - id: 42
                      text: مهم
                      sender:
                        id: 1
                        username: admin
          description: ''
    post:
      operationId: conversationsPinsCreate
      parameters:
      - in: path
        name: conversationId
        schema:
          type: integer
        required: true
      tags:
      - conversations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PinMessageRequest'
            examples:
              پینکردن:
                value:
                  messageId: 42
                summary: پین کردن
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PinMessageRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PinMessageRequest'
        required: true
      responses:
        '201':
          description: No response body
  /api/conversations/{conversationId}/pins/{id}/:
    delete:
      operationId: conversationsPinsDestroy
      parameters:
      - in: path
        name: conversationId
        schema:
          type: integer
        required: true
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - conversations
      responses:
        '204':
          description: No response body
  /api/conversations/{id}/:
    get:
      operationId: conversationsRetrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - conversations
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
          description: ''
        '403':
          description: عدم عضویت
  /api/conversations/{id}/search/:
    get:
      operationId: conversationsSearchRetrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      - in: query
        name: q
        schema:
          type: string
        description: عبارت جستجو
      tags:
      - conversations
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
              examples:
                نتایججستجو:
                  value:
                  - - id: 42
                      text: کجا هستی؟
                      sender:
                        id: 1
                        username: admin
                      createdAt: '2026-05-30T11:00:00Z'
                  summary: نتایج جستجو
          description: ''
  /api/favorites/:
    get:
      operationId: favoritesList
      tags:
      - favorites
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conversation'
              examples:
                علاقه‌مندی‌ها:
                  value:
                  - - id: 1
                      type: private
                      participants: []
                      lastMessage: null
          description: ''
    post:
      operationId: favoritesCreate
      tags:
      - favorites
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddFavoriteRequest'
            examples:
              افزودن:
                value:
                  conversationId: 1
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AddFavoriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AddFavoriteRequest'
        required: true
      responses:
        '201':
          description: No response body
  /api/favorites/{id}/:
    delete:
      operationId: favoritesDestroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - favorites
      responses:
        '204':
          description: No response body
  /api/groups/:
    get:
      operationId: groupsList
      tags:
      - groups
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Group'
              examples:
                لیستگروه‌ها:
                  value:
                  - - id: 1
                      name: گروه برنامه‌نویسی
                      owner:
                        id: 1
                        username: admin
                      memberCount: 15
                      maxMembers: 50
                      description: بحث در مورد برنامه‌نویسی
                      groupImage: null
                      createdAt: '2026-05-29T08:00:00Z'
                  summary: لیست گروه‌ها
          description: ''
    post:
      operationId: groupsCreate
      tags:
      - groups
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              examples:
                گروهایجادشده:
                  value:
                    id: 2
                    name: گروه جدید
                    owner:
                      id: 1
                      username: admin
                    memberCount: 1
                    maxMembers: 50
                    description: null
                    createdAt: '2026-05-30T12:00:00Z'
                  summary: گروه ایجادشده
          description: ''
  /api/groups/{id}/:
    get:
      operationId: groupsRetrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - groups
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
          description: ''
    put:
      operationId: groupsUpdate
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - groups
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
      responses:
        '200':
          description: No response body
    patch:
      operationId: groupsPartialUpdate
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - groups
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPartialUpdateGroupRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPartialUpdateGroupRequest'
      responses:
        '200':
          description: No response body
    delete:
      operationId: groupsDestroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - groups
      responses:
        '204':
          description: No response body
        '403':
          description: فقط مالک
  /api/groups/{id}/add_member/:
    post:
      operationId: groupsAddMemberCreate
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - groups
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddMemberResponse'
              examples:
                موفق:
                  value:
                    detail: Member added.
                    faMessage: عضو اضافه شد.
          description: ''
        '400':
          description: خطا
  /api/groups/{id}/remove_member/{userId}/:
    delete:
      operationId: groupsRemoveMemberDestroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      - in: path
        name: userId
        schema:
          type: string
        required: true
      tags:
      - groups
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RemoveMemberResponse'
              examples:
                موفق:
                  value:
                    detail: Member removed.
                    faMessage: عضو حذف شد.
          description: ''
  /api/logo/:
    get:
      operationId: logoRetrieve
      tags:
      - logo
      security:
      - {}
      responses:
        '200':
          description: No response body
  /api/messages/{id}/:
    get:
      operationId: messagesRetrieve
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - messages
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
          description: ''
    put:
      operationId: messagesUpdate
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - messages
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditMessageRequest'
            examples:
              ویرایشمتن:
                value:
                  text: متن جدید
                summary: ویرایش متن
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EditMessageRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EditMessageRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
              examples:
                پیامویرایش‌شده:
                  value:
                    id: 100
                    conversation: 1
                    sender:
                      id: 1
                      username: admin
                    text: متن جدید
                    editedAt: '2026-05-30T10:05:00Z'
                    createdAt: '2026-05-30T10:00:00Z'
                  summary: پیام ویرایش‌شده
          description: ''
        '403':
          description: غیرمجاز
    patch:
      operationId: messagesPartialUpdate
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - messages
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPartialEditMessageRequest'
            examples:
              ویرایشجزئی:
                value:
                  text: ویرایش جزئی
                summary: ویرایش جزئی
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPartialEditMessageRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPartialEditMessageRequest'
      responses:
        '200':
          description: No response body
    delete:
      operationId: messagesDestroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - messages
      responses:
        '204':
          description: No response body
        '403':
          description: غیرمجاز
  /api/mutes/:
    post:
      operationId: mutesCreate
      tags:
      - mutes
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MuteConversationRequest'
            examples:
              میوت:
                value:
                  conversationId: 1
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MuteConversationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MuteConversationRequest'
        required: true
      responses:
        '201':
          description: No response body
  /api/mutes/{id}/:
    delete:
      operationId: mutesDestroy
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - mutes
      responses:
        '204':
          description: No response body
  /api/profile/:
    get:
      operationId: profileRetrieve
      tags:
      - profile
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
              examples:
                پروفایلکاربر:
                  value:
                    displayName: مدیر ارشد
                    bio: سلام، من مدیر هستم.
                    avatar: /media/avatars/abc.jpg
                  summary: پروفایل کاربر
          description: ''
    patch:
      operationId: profilePartialUpdate
      tags:
      - profile
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProfileRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProfileRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
              examples:
                پروفایلبه‌روزرسانی‌شده:
                  value:
                    displayName: نام جدید
                    bio: توضیحات جدید
                    avatar: /media/avatars/abc.jpg
                  summary: پروفایل به‌روزرسانی‌شده
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileError'
          description: ''
  /api/public-users/:
    get:
      operationId: publicUsersList
      tags:
      - public-users
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicUser'
              examples:
                کاربرانعمومی:
                  value:
                  - - id: 1
                      username: admin
                      displayName: مدیر
                    - id: 2
                      username: user1
                      displayName: کاربر
                  summary: کاربران عمومی
          description: ''
  /api/public-users/{id}/:
    get:
      operationId: publicUsersRetrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this user.
        required: true
