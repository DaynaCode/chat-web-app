components:
  schemas:
    AddFavoriteRequest:
      type: object
      properties:
        conversationId:
          type: integer
      required:
      - conversationId
    AddMemberRequest:
      type: object
      properties:
        userId:
          type: integer
      required:
      - userId
    AddMemberResponse:
      type: object
      properties:
        detail:
          type: string
        faMessage:
          type: string
      required:
      - detail
      - faMessage
    Conversation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        type:
          $ref: '#/components/schemas/ConversationTypeEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        participants:
          type: array
          items:
            $ref: '#/components/schemas/User'
          readOnly: true
        last_message:
          type: string
          readOnly: true
      required:
      - created_at
      - id
      - last_message
      - participants
      - type
    ConversationError:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    ConversationTypeEnum:
      enum:
      - private
      - group
      type: string
      description: |-
        * `private` - Private
        * `group` - Group
    CreateConversationRequest:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/CreateConversationTypeEnum'
        userId:
          type: integer
      required:
      - type
    CreateConversationTypeEnum:
      enum:
      - private
      - group
      type: string
      description: |-
        * `private` - private
        * `group` - group
    CreateGroupRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
      required:
      - name
    EditMessageRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
      required:
      - text
    Group:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        owner:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        max_members:
          type: integer
          maximum: 32767
          minimum: 0
        member_count:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        description:
          type: string
          nullable: true
        group_image:
          type: string
          format: uri
          nullable: true
      required:
      - created_at
      - id
      - member_count
      - name
      - owner
    LoginBadRequest:
      type: object
      properties:
        detail:
          type: string
        faMessage:
          type: string
      required:
      - detail
      - faMessage
    LoginInputRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
      required:
      - password
      - username
    LoginSuccess:
      type: object
      properties:
        detail:
          type: string
        faMessage:
          type: string
        access:
          type: string
        refresh:
          type: string
      required:
      - access
      - detail
      - faMessage
      - refresh
    LoginUnauthorized:
      type: object
      properties:
        detail:
          type: string
        faMessage:
          type: string
      required:
      - detail
      - faMessage
    LogoutRequestRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
    LogoutSuccess:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    MarkReadRequest:
      type: object
      properties:
        messageIds:
          type: array
          items:
            type: integer
      required:
      - messageIds
    MarkReadResponse:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    Message:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        conversation:
          type: integer
          readOnly: true
        sender:
          allOf:
          - $ref: '#/components/schemas/User'
          readOnly: true
        text:
          type: string
          readOnly: true
        image:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - conversation
      - created_at
      - id
      - sender
      - text
    MuteConversationRequest:
      type: object
      properties:
        conversationId:
          type: integer
      required:
      - conversationId
    PatchedPartialEditMessageRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
    PatchedPartialUpdateGroupRequest:
      type: object
      properties:
        description:
          type: string
          minLength: 1
    PatchedProfileRequest:
      type: object
      properties:
        display_name:
          type: string
          nullable: true
          maxLength: 100
        bio:
          type: string
          nullable: true
        avatar:
          type: string
          format: binary
          nullable: true
    PatchedUserUpdateRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        is_active:
          type: boolean
          title: Active
          description: Designates whether this user should be treated as active. Unselect
            this instead of deleting accounts.
        password:
          type: string
          writeOnly: true
          minLength: 1
    PinMessageRequest:
      type: object
      properties:
        messageId:
          type: integer
      required:
      - messageId
    Profile:
      type: object
      properties:
        display_name:
          type: string
          nullable: true
          maxLength: 100
        bio:
          type: string
          nullable: true
        avatar:
          type: string
          format: uri
          nullable: true
    ProfileError:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    PublicUser:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        display_name:
          type: string
          readOnly: true
          default: ''
      required:
      - display_name
      - id
      - username
    RefreshError:
      type: object
      properties:
        detail:
          type: string
        faMessage:
          type: string
      required:
      - detail
      - faMessage
    RefreshRequestRequest:
      type: object
      properties:
        refresh:
          type: string
          minLength: 1
      required:
      - refresh
    RefreshSuccess:
      type: object
      properties:
        access:
          type: string
      required:
      - access
    RemoveMemberResponse:
      type: object
      properties:
        detail:
          type: string
        faMessage:
          type: string
      required:
      - detail
      - faMessage
    ResetDone:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    ResetPasswordRequest:
      type: object
      properties:
        newPassword:
          type: string
          minLength: 1
      required:
      - newPassword
    SendMessageRequest:
      type: object
      properties:
        text:
          type: string
          minLength: 1
        imageId:
          type: integer
        repliedToId:
          type: integer
      required:
      - text
    UnreadCounts:
      type: object
      properties:
        conversationId:
          type: integer
        unread:
          type: integer
      required:
      - conversationId
      - unread
    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        maxMembers:
          type: integer
    UploadError:
      type: object
      properties:
        detail:
          type: string
      required:
      - detail
    UploadSuccess:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
      required:
      - id
      - url
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          pattern: ^[\w.@+-]+$
          maxLength: 150
        is_active:
          type: boolean
